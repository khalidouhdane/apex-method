<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APEX Loader Concepts</title>
  
  <link rel="stylesheet" href="style.css">

  <style>
    body, html {
      margin: 0; padding: 0; width: 100%; height: 100%;
      background: #0F0D0B; overflow: hidden;
      font-family: 'Aeonik', sans-serif;
    }

    .demo-container {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; 
      align-items: center; justify-content: center;
      gap: 60px;
      opacity: 1; pointer-events: auto;
    }

    .controls {
      position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 16px; z-index: 100;
      background: rgba(22, 22, 22, 0.8);
      padding: 12px 24px; border-radius: 40px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(204, 142, 102, 0.2);
    }

    .ctrl-btn {
      background: none; border: none;
      color: #A66840; font-family: 'Platform', sans-serif;
      font-size: 14px; font-weight: 600; letter-spacing: 0.1em;
      cursor: pointer; padding: 8px 16px; border-radius: 20px;
      transition: all 0.3s ease;
    }

    .ctrl-btn:hover { color: #FFF2E0; }
    .ctrl-btn.active { background: #CC8E66; color: #0F0D0B; }

    #demo-wrap {
      position: relative;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    #demo .logo-svg {
      width: 140px; height: auto; overflow: visible;
      position: relative;
      z-index: 2;
    }
    
    #demo .logo-path {
      fill: transparent;
      stroke: transparent; stroke-width: 1.5px; stroke-linejoin: round;
    }

    .logo-method-wrap {
      margin-top: -4px;
      height: 20px;
      display: flex; justify-content: center; align-items: center;
    }

    .logo-method {
      font-family: 'Platform';
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0.8em;
      color: #CC8E66;
      text-transform: uppercase;
      opacity: 0;
      margin-right: -0.8em; /* Offset for tracking */
    }
    
    #demo .loading-text {
      font-family: 'Platform';
      font-size: 14px; letter-spacing: 0.4em; color: #CC8E66; opacity: 0;
      white-space: nowrap;
    }

    /* Trail Layer */
    #trail-container {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }
    .trail-svg {
      width: 100%; height: 100%;
    }
    .trail-path {
      fill: none;
      stroke-linecap: round;
      filter: drop-shadow(0 0 8px rgba(204, 142, 102, 0.4));
    }

  </style>
</head>
<body>

  <!-- Controls -->
  <div class="controls">
    <div style="display: flex; flex-direction: column; gap: 8px;">
      <div style="display: flex; gap: 8px;">
        <span style="color: #666; font-size: 10px; align-self: center; margin-right: 8px;">ENTRANCE:</span>
        <button class="ctrl-btn" id="btn-ent-1" onclick="setEntrance('stroke', 1)">STROKE</button>
        <button class="ctrl-btn" id="btn-ent-2" onclick="setEntrance('flip', 2)">3D FLIP</button>
        <button class="ctrl-btn" id="btn-ent-3" onclick="setEntrance('slide', 3)">SLIDE</button>
        <button class="ctrl-btn" id="btn-ent-4" onclick="setEntrance('blur', 4)">BLUR</button>
        <button class="ctrl-btn active" id="btn-ent-5" onclick="setEntrance('celestial', 5)">CELESTIAL</button>
      </div>
      <div style="display: flex; gap: 8px;">
        <span style="color: #666; font-size: 10px; align-self: center; margin-right: 8px;">TRAILS:</span>
        <button class="ctrl-btn" id="btn-trail-1" onclick="setTrail('curved', 1)">CURVED</button>
        <button class="ctrl-btn active" id="btn-trail-2" onclick="setTrail('straight', 2)">STRAIGHT</button>
      </div>
      <div style="display: flex; gap: 8px;">
        <span style="color: #666; font-size: 10px; align-self: center; margin-right: 8px;">LOCKUP:</span>
        <button class="ctrl-btn" id="btn-lock-1" onclick="setLockup('logo', 1)">LOGO ONLY</button>
        <button class="ctrl-btn active" id="btn-lock-2" onclick="setLockup('full', 2)">FULL LOGO</button>
      </div>
      <div style="display: flex; gap: 8px;">
        <span style="color: #666; font-size: 10px; align-self: center; margin-right: 8px;">EXIT:</span>
        <button class="ctrl-btn active" id="btn-exit-1" onclick="setExit('navbar', 1)">TO NAVBAR</button>
        <button class="ctrl-btn" id="btn-exit-2" onclick="setExit('blur', 2)">BLUR OUT</button>
        <button class="ctrl-btn" id="btn-exit-3" onclick="setExit('reverse', 3)">REV. CELESTIAL</button>
        <button class="ctrl-btn" style="border-left: 1px solid #333; margin-left: 8px; padding-left: 24px; color: #FFF2E0;" onclick="replayCurrent()">PLAY NOW</button>
      </div>
    </div>
  </div>

  <!-- DEMO CONTAINER -->
  <div id="demo" class="demo-container">
    <div id="trail-container">
      <svg class="trail-svg" viewBox="0 0 1000 1000" preserveAspectRatio="none">
        <defs>
          <linearGradient id="trail-grad" x1="0%" y1="100%" x2="50%" y2="0%">
            <stop offset="0%" stop-color="transparent" />
            <stop offset="100%" stop-color="#CC8E66" />
          </linearGradient>
        </defs>
        <path id="trail-left" class="trail-path" d="M 200 800 L 500 200" stroke="url(#trail-grad)" stroke-width="2" style="opacity: 0;" />
        <path id="trail-right" class="trail-path" d="M 800 800 L 500 200" stroke="url(#trail-grad)" stroke-width="2" style="opacity: 0;" />
      </svg>
    </div>

    <div id="demo-wrap">
      <svg class="logo-svg" viewBox="0 0 66 20" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="bronze-grad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#C07133" />
            <stop offset="100%" stop-color="#D1935B" />
          </linearGradient>
        </defs>
        <path class="logo-path" d="M11.7886 0H19.0049V20H8.99294L11.6787 15.342H14.5577V7.19908L5.64805 20H0L12.9704 1.3718L11.7886 0Z"/>
        <path class="logo-path" d="M29.5851 0H21.1414L22.7665 1.88766V20H27.5243V12.0214H29.6154C31.5246 12.0214 33.0398 11.475 34.1573 10.3745C35.2748 9.2778 35.8316 7.80283 35.8316 5.95338C35.8316 4.10394 35.3051 2.57929 34.2558 1.54757C33.2065 0.515858 31.6496 0 29.5851 0ZM30.445 7.35575C30.1419 7.69201 29.7214 7.86397 29.1835 7.86397H27.5243V4.16507H29.1835C29.7214 4.16507 30.1419 4.32556 30.445 4.65418C30.7518 4.9828 30.9033 5.42606 30.9033 5.98395C30.9033 6.54184 30.7518 7.01949 30.445 7.35575Z"/>
        <path class="logo-path" d="M41.9607 15.491H46.658V20H37.1801V1.88766L35.5513 0H46.5746V4.50898H41.9607V7.60413H46.4345V12.052H41.9607V15.491Z"/>
        <path class="logo-path" d="M66 20H60.4694L56.5449 13.9014C55.9312 14.807 55.3592 15.6859 54.8251 16.5304C54.291 17.3787 53.8137 18.1391 53.3932 18.8154C52.9727 19.488 52.7227 19.8854 52.647 20H47.2906L53.7948 9.68284L47.5217 0H53.3364L56.8025 5.49102L60.155 0H65.7689L59.5527 9.82805L66 20Z"/>
      </svg>
      <div class="logo-method-wrap">
        <div class="logo-method" id="method-text">METHOD</div>
      </div>
    </div>
    <div class="loading-text" id="demo-percent">0%</div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.15.0/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.15.0/dist/DrawSVGPlugin.min.js"></script>

  <script>
    gsap.registerPlugin(DrawSVGPlugin);

    let currentEntrance = 'celestial';
    let currentTrail = 'straight';
    let currentLockup = 'full';
    let currentExit = 'navbar';
    let currentTl = null;

    function runDemo() {
      if (currentTl) {
        currentTl.progress(0).kill();
      }
      
      // Cleanup
      gsap.set('#demo .logo-path', { clearProps: "all" });
      gsap.set('#demo .logo-svg', { clearProps: "all" });
      gsap.set('#demo-wrap', { clearProps: "all" });
      gsap.set('#method-text', { clearProps: "all" });
      gsap.set('.trail-path', { drawSVG: "0% 0%", opacity: 0 });
      gsap.set('#demo .loading-text', { opacity: 0, y: 0, color: "#CC8E66" });
      gsap.set('.logo-method-wrap', { display: currentLockup === 'full' ? 'flex' : 'none' });
      document.getElementById('demo-percent').innerText = "0%";

      // Set Trail Path Data
      if (currentTrail === 'curved') {
        document.getElementById('trail-left').setAttribute('d', 'M 200 800 Q 300 400 500 200');
        document.getElementById('trail-right').setAttribute('d', 'M 800 800 Q 700 400 500 200');
      } else {
        document.getElementById('trail-left').setAttribute('d', 'M 200 800 L 500 200');
        document.getElementById('trail-right').setAttribute('d', 'M 800 800 L 500 200');
      }

      currentTl = gsap.timeline();
      
      const paths = document.querySelectorAll('#demo .logo-path');
      const method = '#method-text';
      const whiteColor = "#FFF2E0";
      const bronzeColor = "#CC8E66";

      // 1. Initial State for METHOD
      if (currentEntrance === 'stroke') {
        gsap.set(paths, { drawSVG: "0% 0%", fill: "transparent", stroke: whiteColor });
        gsap.set(method, { opacity: 0, y: 10 });
      } else if (currentEntrance === 'flip') {
        gsap.set(paths, { fill: whiteColor, opacity: 0, rotationX: -90, transformOrigin: "center top" });
        gsap.set(method, { opacity: 0, rotationX: -90, transformOrigin: "center top" });
      } else if (currentEntrance === 'slide') {
        gsap.set('#demo-wrap', { overflow: 'hidden' });
        gsap.set(paths, { fill: whiteColor, y: 40, opacity: 1 });
        gsap.set(method, { opacity: 1, y: 40 });
      } else if (currentEntrance === 'blur') {
        gsap.set(paths, { fill: whiteColor, opacity: 0, scale: 1.2, filter: "blur(20px)" });
        gsap.set(method, { opacity: 0, scale: 1.2, filter: "blur(10px)" });
      } else if (currentEntrance === 'celestial') {
        gsap.set(paths, { fill: whiteColor, opacity: 0 });
        gsap.set(method, { opacity: 0 });
      }

      // 2. Percentage Animation
      const percentObj = { val: 0 };
      currentTl.to(percentObj, {
        val: 100, duration: 1.5, ease: 'power1.inOut',
        onUpdate: () => document.getElementById('demo-percent').innerText = Math.round(percentObj.val) + "%"
      }, 0);
      currentTl.to('#demo .loading-text', { opacity: 1, duration: 0.4 }, 0);

      // 3. APEX TRAILS (The Ascent)
      currentTl.to('.trail-path', { opacity: 1, duration: 0.2 }, 0.2);
      currentTl.to('.trail-path', {
        drawSVG: "0% 100%", duration: 1.3, ease: 'power2.inOut'
      }, 0.2);
      currentTl.to('.trail-path', {
        strokeWidth: 4, filter: "drop-shadow(0 0 15px #CC8E66)", duration: 0.3
      }, 1.2);
      currentTl.to('.trail-path', { opacity: 0, duration: 0.4 }, 1.5);

      // 4. ENTRANCE ANIMATIONS
      if (currentEntrance === 'stroke') {
        currentTl.to(paths, { drawSVG: "0% 100%", duration: 0.5, stagger: 0.15, ease: 'power2.inOut' }, 0.2);
        currentTl.to(paths, { fill: whiteColor, stroke: "transparent", duration: 0.4, stagger: 0.1 }, 1.0);
        currentTl.to(method, { opacity: 1, y: 0, duration: 0.6 }, 1.2);

      } else if (currentEntrance === 'flip') {
        currentTl.to(paths, { opacity: 1, rotationX: 0, duration: 0.8, stagger: 0.1, ease: 'back.out(1.7)' }, 0.3);
        currentTl.to(method, { opacity: 1, rotationX: 0, duration: 0.8, ease: 'back.out(1.7)' }, 0.7);

      } else if (currentEntrance === 'slide') {
        currentTl.to(paths, { y: 0, duration: 1, stagger: 0.08, ease: 'power4.out' }, 0.3);
        currentTl.to(method, { y: 0, duration: 1, ease: 'power4.out' }, 0.6);

      } else if (currentEntrance === 'blur') {
        currentTl.to(paths, { opacity: 1, scale: 1, filter: "blur(0px)", duration: 1.2, stagger: 0.1, ease: 'power3.out' }, 0.2);
        currentTl.to(method, { opacity: 1, scale: 1, filter: "blur(0px)", duration: 1.2, ease: 'power3.out' }, 0.6);

      } else if (currentEntrance === 'celestial') {
        paths.forEach((p, i) => {
          currentTl.to(p, { opacity: 0.2, duration: 0.1 }, 0.2 + (i * 0.1));
          currentTl.to(p, { opacity: 1, duration: 0.05 }, 0.4 + (i * 0.15));
          currentTl.to(p, { opacity: 0.5, duration: 0.05 }, 0.45 + (i * 0.15));
          currentTl.to(p, { opacity: 1, duration: 0.1 }, 0.5 + (i * 0.15));
        });
        // Celestial for METHOD
        currentTl.to(method, { opacity: 0.4, duration: 0.1 }, 0.8);
        currentTl.to(method, { opacity: 1, duration: 0.1 }, 1.0);
        currentTl.to(method, { opacity: 0.6, duration: 0.05 }, 1.1);
        currentTl.to(method, { opacity: 1, duration: 0.2 }, 1.2);
      }

      // 5. EXIT
      const counter = '#demo .loading-text';
      const logo = '#demo .logo-svg';

      if (currentExit === 'navbar') {
        currentTl.to([counter, method], { opacity: 0, duration: 0.4 }, 1.8);
        currentTl.to(logo, { 
          scale: 0.41, 
          y: -window.innerHeight / 2 + 60,
          duration: 0.8, ease: 'power3.inOut' 
        }, 2.0);

      } else if (currentExit === 'blur') {
        currentTl.to([logo, method, counter], { 
          opacity: 0, scale: 1.1, filter: "blur(10px)",
          duration: 0.6, ease: 'power2.in', stagger: 0.05
        }, 2.0);

      } else if (currentExit === 'reverse') {
        // Reverse Celestial for METHOD
        currentTl.to(method, { opacity: 0.4, duration: 0.1 }, 1.8);
        currentTl.to(method, { opacity: 0, duration: 0.1 }, 1.9);
        
        currentTl.to(counter, { opacity: 0, duration: 0.2 }, 1.8);

        paths.forEach((p, i) => {
          const delay = 2.0 + (i * 0.05);
          currentTl.to(p, { opacity: 0.4, duration: 0.05 }, delay);
          currentTl.to(p, { opacity: 1, duration: 0.05 }, delay + 0.05);
          currentTl.to(p, { opacity: 0, duration: 0.1 }, delay + 0.1);
        });
      }
    }

    function setEntrance(type, idx) {
      document.querySelectorAll('[id^="btn-ent-"]').forEach(b => b.classList.remove('active'));
      document.getElementById('btn-ent-' + idx).classList.add('active');
      currentEntrance = type;
      runDemo();
    }

    function setTrail(type, idx) {
      document.querySelectorAll('[id^="btn-trail-"]').forEach(b => b.classList.remove('active'));
      document.getElementById('btn-trail-' + idx).classList.add('active');
      currentTrail = type;
      runDemo();
    }

    function setLockup(type, idx) {
      document.querySelectorAll('[id^="btn-lock-"]').forEach(b => b.classList.remove('active'));
      document.getElementById('btn-lock-' + idx).classList.add('active');
      currentLockup = type;
      runDemo();
    }

    function setExit(type, idx) {
      document.querySelectorAll('[id^="btn-exit-"]').forEach(b => b.classList.remove('active'));
      document.getElementById('btn-exit-' + idx).classList.add('active');
      currentExit = type;
      runDemo();
    }

    function replayCurrent() {
      runDemo();
    }

    // Initialize
    setTimeout(() => runDemo(), 500);

  </script>
</body>
</html>
